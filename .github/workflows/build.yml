name: Build Gale
on: [ push, pull_request ]
jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.commits[0].message, '[ci-skip]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - run: chmod +x gradlew
      - run: git config --global user.email "no-reply@github.com" && git config --global user.name "Github Actions"
      - run: ./gradlew :gale-server:applyAllServerPatches
      - run: ./gradlew :gale-server:createPaperclipJar
      - uses: actions/upload-artifact@v4
        with:
          name: Gale
          path: gale-server/build/libs/gale-paperclip-*.jar
